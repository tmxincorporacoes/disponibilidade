<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMX Incorporações — Disponibilidade</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f1f5f9;color:#222;font-size:13px;}
.tabs{display:flex;background:#1e3a5f;padding:0 16px;align-items:center;flex-wrap:wrap;gap:4px;}
.tab{padding:14px 20px;color:#94a3b8;cursor:pointer;font-size:14px;font-weight:600;border-bottom:3px solid transparent;}
.tab.active{color:#fff;border-bottom:3px solid #60a5fa;}
.tab-content{display:none;} .tab-content.active{display:block;}
.sync-status{font-size:11px;color:#94a3b8;padding:0 12px;margin-left:auto;}
.sync-ok{color:#4ade80;} .sync-err{color:#f87171;} .sync-saving{color:#fbbf24;}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-box{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:40px;width:320px;text-align:center;}
.login-box h2{color:#1e3a5f;margin-bottom:8px;}
.login-box p{color:#64748b;font-size:12px;margin-bottom:24px;}
.login-box input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;margin-bottom:12px;text-align:center;letter-spacing:2px;}
.login-box button{width:100%;padding:10px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;}
.login-err{color:#dc2626;font-size:12px;margin-top:8px;}
.admin{max-width:960px;margin:24px auto;padding:0 16px;}
.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:20px;overflow:hidden;}
.card-head{background:#1e3a5f;color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;}
.card-head h2{font-size:15px;}
.card-body{padding:16px 18px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.field-row.three{grid-template-columns:1fr 1fr 1fr;}
.field-row.full{grid-template-columns:1fr;}
label{display:block;font-size:11px;color:#64748b;margin-bottom:3px;font-weight:600;}
input[type=text],input[type=number],input[type=password],textarea{width:100%;padding:7px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;font-family:Arial;}
textarea{resize:vertical;min-height:60px;}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;}
.btn-blue{background:#2563b0;color:#fff;} .btn-blue:hover{background:#1d4ed8;}
.btn-green{background:#16a34a;color:#fff;} .btn-green:hover{background:#15803d;}
.btn-red{background:#dc2626;color:#fff;} .btn-red:hover{background:#b91c1c;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.obra-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:16px;}
.obra-card-head{background:#1e3a5f;color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;}
.obra-card-body{padding:14px 16px;}
.obra-nome{font-size:14px;font-weight:700;}
.obra-meta{font-size:11px;opacity:.8;margin-top:2px;}
.unidades-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;}
.unidades-table th{background:#f1f5f9;padding:6px 8px;text-align:left;font-size:11px;color:#64748b;border-bottom:1px solid #e2e8f0;}
.unidades-table td{padding:5px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.unidades-table tr:last-child td{border-bottom:none;}
.unit-toggle{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:600;min-width:80px;}
.unit-toggle.disp{background:#dcfce7;color:#15803d;border:1px solid #86efac;}
.unit-toggle.vend{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;}
.unit-val-input{width:110px;padding:4px 7px;font-size:12px;}
.unit-val-hint{font-size:10px;color:#94a3b8;margin-left:4px;}
.add-unit-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.add-unit-row input{width:130px;}
.planta-preview{max-width:100%;max-height:200px;border-radius:6px;border:1px solid #e2e8f0;margin-top:8px;display:block;}
.upload-area{border:2px dashed #cbd5e1;border-radius:8px;padding:16px;text-align:center;margin-top:6px;color:#94a3b8;font-size:12px;}
.upload-area input[type=file]{display:none;}
.upload-area label{cursor:pointer;color:#2563b0;font-weight:600;text-decoration:underline;}
.converting{color:#f59e0b;font-size:12px;margin-top:6px;}
.view{max-width:900px;margin:0 auto;padding:28px 32px;background:#fff;}
.v-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #2563b0;padding-bottom:12px;margin-bottom:6px;}
.v-logo img{height:70px;border-radius:6px;}
.v-title{text-align:right;}
.v-title h1{font-size:20px;font-weight:700;color:#2563b0;}
.v-title p{font-size:11px;color:#555;margin-top:2px;}
.v-legend{display:flex;gap:16px;margin:12px 0 16px;}
.v-legend-item{display:flex;align-items:center;gap:5px;font-size:12px;}
.leg-box{width:13px;height:13px;border-radius:3px;}
.leg-d{background:#4ade80;border:1px solid #16a34a;} .leg-v{background:#f87171;border:1px solid #dc2626;}
.v-resumo{display:flex;gap:12px;margin-bottom:18px;}
.v-res-card{flex:1;border:1px solid #d1d5db;border-radius:7px;padding:10px;text-align:center;}
.v-res-num{font-size:24px;font-weight:700;} .v-res-lbl{font-size:11px;color:#666;margin-top:2px;}
.c-blue{color:#2563b0;} .c-green{color:#16a34a;} .c-red{color:#dc2626;}
.v-empr{margin-bottom:24px;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;}
.v-empr-head{background:#2563b0;color:#fff;padding:9px 14px;display:flex;justify-content:space-between;}
.v-empr-nome{font-size:15px;font-weight:700;} .v-empr-sub{font-size:11px;opacity:.85;margin-top:1px;}
.v-empr-hr{text-align:right;font-size:12px;}
.v-empr-body{padding:12px 14px;}
.v-unidades{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.v-unit{min-width:80px;padding:6px 8px;border-radius:5px;text-align:center;font-size:11px;font-weight:600;}
.v-unit.disp{background:#dcfce7;color:#15803d;border:1px solid #86efac;}
.v-unit.vend{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;}
.v-unit-num{font-size:12px;} .v-unit-val{font-size:10px;font-weight:400;margin-top:1px;}
.v-unit-tipo{font-size:9px;font-weight:400;color:#555;margin-top:1px;}
.v-unit-st{font-size:9px;font-weight:400;margin-top:1px;}
.v-empr-info{display:flex;gap:16px;padding-top:8px;border-top:1px solid #e5e7eb;font-size:11px;color:#555;flex-wrap:wrap;}
.v-empr-info span{font-weight:600;color:#222;}
.v-obs{font-size:11px;color:#475569;margin-top:6px;padding:6px 10px;background:#f8fafc;border-left:3px solid #2563b0;border-radius:0 4px 4px 0;}
.v-planta{margin-top:10px;}
.v-planta img{max-width:100%;border-radius:6px;border:1px solid #e2e8f0;}
.v-planta-label{font-size:10px;color:#94a3b8;margin-top:4px;}
.v-footer{margin-top:20px;border-top:1px solid #e5e7eb;padding-top:8px;font-size:10px;color:#999;text-align:center;}
.btn-print-bar{text-align:center;padding:16px;background:#f8fafc;border-top:1px solid #e2e8f0;}
.loading{text-align:center;padding:60px;color:#94a3b8;font-size:15px;}
@media print{
  .tabs,.btn-print-bar{display:none!important;}
  .tab-content{display:block!important;}
  .admin{display:none!important;}
  .login-wrap{display:none!important;}
  .view{padding:12px 16px;max-width:100%;}
  body{background:#fff;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>

<div class="tabs" id="tabs-bar">
  <div class="tab active" onclick="showTab('view',this)">&#127968; Disponibilidade</div>
  <span class="sync-status" id="sync-status"></span>
</div>

<div id="tab-view" class="tab-content active">
  <div class="view" id="view-content"><div class="loading">Carregando...</div></div>
  <div class="btn-print-bar">
    <button class="btn btn-blue" onclick="window.print()" style="font-size:15px;padding:12px 36px;">&#128424; Imprimir / Salvar como PDF</button>
  </div>
</div>

<div id="tab-admin" class="tab-content">
  <div id="admin-login" class="login-wrap">
    <div class="login-box">
      <h2>&#128274; Área de edição</h2>
      <p>Digite a senha para acessar</p>
      <input type="password" id="senha-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')verificaSenha()">
      <button onclick="verificaSenha()">Entrar</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
  <div id="admin-painel" style="display:none">
    <div class="admin">
      <div class="card">
        <div class="card-head"><h2>&#43; Nova obra</h2></div>
        <div class="card-body">
          <div class="field-row">
            <div><label>Nome da obra</label><input type="text" id="n-nome" placeholder="Ex: São Luís 4"></div>
            <div><label>Endereço</label><input type="text" id="n-end" placeholder="Ex: Rua das Flores, 100 — Bairro"></div>
          </div>
          <div class="field-row three">
            <div><label>Previsão de entrega</label><input type="text" id="n-entrega" placeholder="Ex: Jun/2026"></div>
            <div><label>Valor padrão (R$)</label><input type="number" id="n-valor" placeholder="Ex: 289000"></div>
            <div><label>Qtd de unidades</label><input type="number" id="n-qtd" placeholder="Ex: 9" min="1"></div>
          </div>
          <div class="field-row">
            <div><label>Prefixo unidades</label><input type="text" id="n-prefixo" placeholder="Ex: 116 → 116,116A... | Casa → Casa 01,02..."></div>
            <div><label>Tipologia padrão</label><input type="text" id="n-tipo" placeholder="Ex: 2 quartos, sala, cozinha, 1 vaga"></div>
          </div>
          <div class="field-row full">
            <div><label>Observação / Documentação</label><input type="text" id="n-obs" placeholder="Ex: Documentação grátis"></div>
          </div>
          <div class="btn-row">
            <button class="btn btn-green" onclick="addObra()">&#43; Adicionar obra</button>
          </div>
        </div>
      </div>
      <div id="obras-list"></div>
    </div>
  </div>
</div>

function fmt(v){return "R$ "+Number(v).toLocaleString("pt-BR");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

function gerarUnidades(prefixo,qtd){
  var p=prefixo.trim(),uns=[];
  if(/\d$/.test(p)){uns.push({n:p,s:"disp",v:null,t:null});var alpha="ABCDEFGHIJKLMNOPQRSTUVWXYZ";for(var i=0;i<qtd-1;i++)uns.push({n:p+alpha[i],s:"disp",v:null,t:null});}
  else{for(var i=1;i<=qtd;i++)uns.push({n:p+" "+String(i).padStart(2,"0"),s:"disp",v:null,t:null});}
  return uns;
}

window.addObra=function(){
  var nome=document.getElementById("n-nome").value.trim();
  if(!nome){alert("Informe o nome da obra.");return;}
  var qtd=parseInt(document.getElementById("n-qtd").value)||1;
  var pre=document.getElementById("n-prefixo").value.trim();
  obras.push({id:nextId++,nome:nome,endereco:document.getElementById("n-end").value.trim(),entrega:document.getElementById("n-entrega").value.trim(),valor:parseFloat(document.getElementById("n-valor").value)||0,tipo:document.getElementById("n-tipo").value.trim(),obs:document.getElementById("n-obs").value.trim(),planta:"",unidades:pre?gerarUnidades(pre,qtd):[{n:"Unidade 01",s:"disp",v:null,t:null}]});
  salvarFirebase();
  ["n-nome","n-end","n-entrega","n-valor","n-qtd","n-prefixo","n-tipo","n-obs"].forEach(function(id){document.getElementById(id).value="";});

};

window.uploadPlanta=function(oid,input){
  var file=input.files[0];if(!file)return;
  var statusEl=document.getElementById("planta-status-"+oid);
  if(file.type==="application/pdf"){
    if(statusEl)statusEl.textContent="Convertendo PDF...";
    var reader=new FileReader();
    reader.onload=function(e){
      var pdfData=new Uint8Array(e.target.result);
      pdfjsLib.getDocument({data:pdfData}).promise.then(function(pdf){return pdf.getPage(1);}).then(function(page){
        var scale=2.0,viewport=page.getViewport({scale:scale});
        var canvas=document.createElement('canvas');canvas.width=viewport.width;canvas.height=viewport.height;
        return page.render({canvasContext:canvas.getContext('2d'),viewport:viewport}).promise.then(function(){return canvas.toDataURL('image/jpeg',0.85);});
      }).then(function(imgData){var o=obras.find(function(o){return o.id===oid;});o.planta=imgData;salvarFirebase();renderAdmin();
      }).catch(function(err){if(statusEl)statusEl.textContent="Erro: "+err.message;});
    };reader.readAsArrayBuffer(file);
  } else {
    var reader=new FileReader();
    reader.onload=function(e){var o=obras.find(function(o){return o.id===oid;});o.planta=e.target.result;salvarFirebase();renderAdmin();};
    reader.readAsDataURL(file);
  }
};

        '<td><input type="text" style="width:85px;padding:3px 6px;font-size:12px" value="'+esc(u.n)+'" onchange="editUnitNome('+o.id+','+ui+',this.value)"></td>'+
        '<td><button class="unit-toggle '+u.s+'" onclick="toggleUnit('+o.id+','+ui+')">'+(u.s==="disp"?"Disponível":"Vendida")+'</button></td>'+
        '<td><input class="unit-val-input" type="number" value="'+(u.v!==null&&u.v!==undefined?u.v:'')+'" placeholder="'+o.valor+'" onchange="editUnitVal('+o.id+','+ui+',this.value)"><span class="unit-val-hint">vazio=padrão</span></td>'+
        '<td><input type="text" style="width:160px;padding:3px 6px;font-size:12px" value="'+esc(u.t||'')+'" placeholder="'+esc(o.tipo||'')+'" onchange="editUnitTipo('+o.id+','+ui+',this.value)"><span class="unit-val-hint">vazio=padrão</span></td>'+
        '<td><button class="btn btn-red btn-sm" onclick="remUnit('+o.id+','+ui+')">&#10005;</button></td>'+
      '</tr>';
    }).join("");
    var plantaHtml=o.planta
      ?'<img class="planta-preview" src="'+o.planta+'"><br><button class="btn btn-red btn-sm" style="margin-top:6px" onclick="remPlanta('+o.id+')">Remover planta</button>'
      :'<div class="upload-area"><input type="file" accept="image/*,application/pdf" id="fp-'+o.id+'" onchange="uploadPlanta('+o.id+',this)"><label for="fp-'+o.id+'">&#128194; Clique para fazer upload</label><p style="margin-top:4px;font-size:11px">Aceita JPG, PNG ou PDF</p><div id="planta-status-'+o.id+'" class="converting"></div></div>';
    html+='<div class="obra-card">'+
      '<div class="obra-card-head"><div><div class="obra-nome">'+esc(o.nome)+'</div><div class="obra-meta">'+esc(o.endereco)+' | '+disp+' disp. / '+vend+' vend.</div></div>'+
      '<button class="btn btn-red btn-sm" onclick="remObra('+o.id+')">&#128465; Remover</button></div>'+
      '<div class="obra-card-body">'+
        '<div class="field-row"><div><label>Nome</label><input type="text" value="'+esc(o.nome)+'" onchange="editCampo('+o.id+',\'nome\',this.value);renderAdmin()"></div><div><label>Endereço</label><input type="text" value="'+esc(o.endereco)+'" onchange="editCampo('+o.id+',\'endereco\',this.value)"></div></div>'+
        '<div class="field-row three"><div><label>Entrega</label><input type="text" value="'+esc(o.entrega)+'" onchange="editCampo('+o.id+',\'entrega\',this.value)"></div><div><label>Valor padrão (R$)</label><input type="number" value="'+o.valor+'" onchange="editCampo('+o.id+',\'valor\',this.value)"></div><div><label>Qtd</label><input type="text" readonly value="'+o.unidades.length+'" style="background:#f1f5f9"></div></div>'+
        '<div class="field-row"><div><label>Tipologia padrão</label><input type="text" value="'+esc(o.tipo||'')+'" onchange="editCampo('+o.id+',\'tipo\',this.value)"></div><div><label>Observação / Documentação</label><input type="text" value="'+esc(o.obs||'')+'" onchange="editCampo('+o.id+',\'obs\',this.value)"></div></div>'+
        '<label style="margin-bottom:6px;display:block">Unidades</label>'+
        '<table class="unidades-table"><thead><tr><th>Unidade</th><th>Status</th><th>Valor individual</th><th>Tipologia individual</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>'+
        '<div class="add-unit-row"><input type="text" id="nu-'+o.id+'" placeholder="Número/nome" onkeydown="if(event.key===\'Enter\')addUnit('+o.id+')"><button class="btn btn-green btn-sm" onclick="addUnit('+o.id+')">+ Unidade</button></div>'+
        '<div style="margin-top:14px"><label>Planta (JPG, PNG ou PDF)</label>'+plantaHtml+'</div>'+
      '</div></div>';
  });
  document.getElementById("obras-list").innerHTML=html||'<p style="color:#94a3b8;text-align:center;padding:24px">Nenhuma obra cadastrada.</p>';
}

function renderView(){
  var totD=0,totV=0;
  obras.forEach(function(o){o.unidades.forEach(function(u){u.s==="disp"?totD++:totV++;});});
  var d=new Date();
  var dataStr=d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  var emprsHtml=obras.map(function(o){
    var disp=o.unidades.filter(function(u){return u.s==="disp";}).length;
    var vend=o.unidades.length-disp;
    var units=o.unidades.map(function(u){
      var val=getVal(u,o.valor);var tipo=getTipo(u,o.tipo);
      return '<div class="v-unit '+u.s+'">'+
        '<div class="v-unit-num">'+u.n+'</div>'+
        (val?'<div class="v-unit-val">'+fmt(val)+'</div>':'')+
        (tipo?'<div class="v-unit-tipo">'+esc(tipo)+'</div>':'')+
        '<div class="v-unit-st">'+(u.s==="disp"?"Disponível":"Vendida")+'</div>'+
      '</div>';
    }).join("");
    return '<div class="v-empr">'+
      '<div class="v-empr-head"><div><div class="v-empr-nome">'+esc(o.nome)+'</div><div class="v-empr-sub">'+esc(o.endereco)+'</div></div>'+
      '<div class="v-empr-hr">Entrega: '+esc(o.entrega)+'<br>'+disp+' disponíve'+(disp===1?'l':'is')+' de '+o.unidades.length+'</div></div>'+
      '<div class="v-empr-body">'+
        '<div class="v-unidades">'+units+'</div>'+
        '<div class="v-empr-info">Disponíveis: <span class="c-green">'+disp+'</span>&nbsp;|&nbsp; Vendidas: <span class="c-red">'+vend+'</span>&nbsp;|&nbsp; Total: <span>'+o.unidades.length+'</span></div>'+
        (o.obs?'<div class="v-obs">&#128203; '+esc(o.obs)+'</div>':'')+
        (o.planta?'<div class="v-planta"><img src="'+o.planta+'"><p class="v-planta-label">Planta de implantação — '+esc(o.nome)+'</p></div>':'')+
      '</div></div>';
  }).join("");
  document.getElementById("view-content").innerHTML=
    '<div class="v-header"><div class="v-logo"><img src="'+LOGO+'" alt="TMX"></div>'+
    '<div class="v-title"><h1>Tabela de Disponibilidade</h1><p>Atualizado em: '+dataStr+'</p></div></div>'+
    '<div class="v-legend"><div class="v-legend-item"><div class="leg-box leg-d"></div> Disponível</div><div class="v-legend-item"><div class="leg-box leg-v"></div> Vendida</div></div>'+
    '<div class="v-resumo">'+
      '<div class="v-res-card"><div class="v-res-num c-blue">'+(totD+totV)+'</div><div class="v-res-lbl">Total de unidades</div></div>'+
      '<div class="v-res-card"><div class="v-res-num c-green">'+totD+'</div><div class="v-res-lbl">Disponíveis</div></div>'+
      '<div class="v-res-card"><div class="v-res-num c-red">'+totV+'</div><div class="v-res-lbl">Vendidas</div></div>'+
    '</div>'+
    emprsHtml+
    '<div class="v-footer">TMX Incorporações — documento para uso dos corretores</div>';
}
</script>
</body>
</html>
